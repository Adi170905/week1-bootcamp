<!DOCTYPE html>
<html>

<head>
    <title>Node.js Bootcamp Browser Project</title>
</head>

<body>

    <h1>Node.js Bootcamp Browser Project</h1>

    <hr>

    <!-- ===================== -->
    <!-- DAY 1 -->
    <!-- ===================== -->

    <h2>DAY 1 - System Information</h2>

    <button id="systemInfoBtn">
        Get System Info
    </button>

    <div id="systemInfoResult"></div>

    <br><br>

    <button id="generateLargeFileBtn">
        Generate Large File
    </button>

    <p id="largeFileStatus"></p>

    <br>

    <button id="bufferTestBtn">
        Run Buffer Test
    </button>

    <div id="bufferResult"></div>

    <br>

    <button id="streamTestBtn">
        Run Stream Test
    </button>

    <div id="streamResult"></div>

    <br>

    <button id="compareBtn">
        Compare Buffer vs Stream
    </button>

    <div id="compareResult"></div>

    <hr>

    <!-- ===================== -->
    <!-- DAY 2 -->
    <!-- ===================== -->

    <h2>DAY 2 - Word Statistics Project</h2>

    <button id="generateBtn">
        Generate Corpus
    </button>

    <p id="generateStatus"></p>

    <br>

    <label>
        Top Words:
    </label>

    <input
        type="number"
        id="top"
        value="10"
    >

    <br><br>

    <label>
        Minimum Word Length:
    </label>

    <input
        type="number"
        id="minLen"
        value="5"
    >

    <br><br>

    <button id="analyzeBtn">
        Analyze Corpus
    </button>

    <div id="result"></div>

    <br>

    <button id="concurrencyBtn">
        Run Concurrency Test
    </button>

    <div id="concurrencyResult"></div>

    <hr>

  <!-- ===================== -->
<!-- DAY 3 -->
<!-- ===================== -->

<h2>DAY 3 - Git Operations</h2>

<button id="gitStatusBtn">
    Show Git Status
</button>

<pre id="gitStatusResult"></pre>

<br>

<button id="gitLogBtn">
    Show Commit History
</button>

<pre id="gitLogResult"></pre>

<br>

<button id="gitStashBtn">
    Git Stash Demo
</button>

<pre id="gitStashResult"></pre>

<br>

<button id="gitStashApplyBtn">
    Git Stash Apply
</button>

<pre id="gitStashApplyResult"></pre>
<br>

<button id="mergeConflictBtn">
    Merge Conflict Demo
</button>

<pre id="mergeConflictResult"></pre>

<br>

<button id="gitRevertBtn">
    Git Revert Demo
</button>

<pre id="gitRevertResult"></pre>

<br>

<button id="gitBisectBtn">
    Git Bisect Demo
</button>

<pre id="gitBisectResult"></pre>
<hr>

<!-- ===================== -->
<!-- DAY 4 -->
<!-- ===================== -->

<h2>DAY 4 - HTTP APIs & Headers</h2>

<button id="echoBtn">
    Echo API
</button>

<pre id="echoResult"></pre>

<br>

<button id="slowBtn">
    Slow API Test
</button>

<pre id="slowResult"></pre>

<br>

<button id="authBtn">
    Fake Authorization Header
</button>

<pre id="authResult"></pre>

<br>

<button id="statusBtn">
    Status Code Demo
</button>

<pre id="statusResult"></pre>
<hr

<hr>

<!-- ===================== -->
<!-- DAY 5 -->
<!-- ===================== -->

<h2>DAY 5 - Automation & Mini-CI Pipeline</h2>

<button id="validateBtn">
    Run Validation
</button>

<pre id="validateResult"></pre>

<br>

<button id="eslintBtn">
    ESLint Check
</button>

<pre id="eslintResult"></pre>

<br>

<button id="buildBtn">
    Build Artifact
</button>

<pre id="buildResult"></pre>

<br>

<button id="checksumBtn">
    Generate SHA Checksum
</button>

<pre id="checksumResult"></pre>

<br>

<button id="scheduleBtn">
    Task Scheduler Demo
</button>

<pre id="scheduleResult"></pre>


<script src="script.js"></script>

</body>

</html>
